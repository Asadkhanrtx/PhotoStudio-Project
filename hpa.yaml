apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: photo-deployment-hpa
  namespace: photostudio-ns
spec:
  scaleTargetRef:
    kind: Deployment
    name: photostudio-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 5
